<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Masters Pool Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        masters: { green: '#006747', dark: '#004d35', light: '#008c5f' },
        augusta: { gold: '#c8a951', cream: '#f5f0e1' },
        board: { bg: '#0f1923', card: '#162029', hover: '#1e2d3a', border: '#253545' }
      }
    }
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');
body { font-family: 'Inter', sans-serif; }
h1, h2, h3, .font-display { font-family: 'Playfair Display', Georgia, serif; }
.font-mono, [class*="font-mono"], td, .tabular-nums { font-variant-numeric: tabular-nums; }
.fade-in { animation: fadeIn 0.3s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.pulse-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.slide-up { animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0f1923; }
::-webkit-scrollbar-thumb { background: #253545; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #354555; }
.mover-up { animation: glowUp 1.5s ease-out; }
@keyframes glowUp { 0% { background-color: rgba(34,197,94,0.2); } 100% { background-color: transparent; } }
.mover-down { animation: glowDown 1.5s ease-out; }
@keyframes glowDown { 0% { background-color: rgba(239,68,68,0.15); } 100% { background-color: transparent; } }
.bounce-in { animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
.scrollbar-hide::-webkit-scrollbar { display: none; }
.rank-gold { background: linear-gradient(135deg, #c8a951 0%, #f0d878 50%, #c8a951 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.rank-silver { background: linear-gradient(135deg, #9ca3af 0%, #d1d5db 50%, #9ca3af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.rank-bronze { background: linear-gradient(135deg, #b45309 0%, #d97706 50%, #b45309 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
:focus-visible { outline: 2px solid #c8a951; outline-offset: 2px; border-radius: 4px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body class="bg-board-bg text-gray-200 min-h-screen">

<!-- Header -->
<header class="bg-masters-green sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl md:text-3xl font-black text-white tracking-tight">THE MASTERS</h1>
        <div class="text-augusta-gold text-sm md:text-base font-semibold">2026 POOL</div>
      </div>
      <div class="flex items-center gap-2 text-xs md:text-sm">
        <span class="pulse-dot w-2 h-2 bg-green-400 rounded-full inline-block"></span>
        <span id="liveStatus" class="text-green-300 font-medium">CONNECTING...</span>
      </div>
    </div>
    <!-- Search -->
    <div class="mt-2 relative">
      <input type="text" id="searchInput" placeholder="Search participants..." 
        class="w-full bg-masters-dark/50 border border-white/20 rounded-lg px-4 py-2 text-white placeholder-white/50 focus:outline-none focus:border-augusta-gold focus:ring-1 focus:ring-augusta-gold text-sm">
      <svg class="absolute right-3 top-2.5 w-4 h-4 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </div>
  </div>
</header>

<!-- Tournament Info Bar -->
<div id="tournamentInfo" class="bg-board-card border-b border-board-border">
  <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between text-xs md:text-sm text-gray-400">
    <span id="roundInfo">Loading tournament data...</span>
    <span id="participantCount">501 participants</span>
  </div>
</div>

<!-- Tab Navigation -->
<div class="bg-board-card border-b border-board-border sticky top-[88px] md:top-[96px] z-40 relative">
  <div class="md:hidden absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-board-card to-transparent pointer-events-none z-10"></div>
  <div class="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto scrollbar-hide" role="tablist" aria-label="Pool views">
    <button onclick="switchTab('leaderboard')" id="tab-leaderboard" role="tab" aria-selected="true" class="tab-btn whitespace-nowrap px-4 py-3 text-sm font-semibold text-augusta-gold border-b-2 border-augusta-gold">Leaderboard</button>
    <button onclick="switchTab('stats')" id="tab-stats" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap px-4 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-300">Player Stats</button>
    <button onclick="switchTab('payouts')" id="tab-payouts" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap px-4 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-300">Payouts</button>
    <button onclick="switchTab('projections')" id="tab-projections" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap px-4 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-300">Projections</button>
    <button onclick="switchTab('rules')" id="tab-rules" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap px-4 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-300">Rules</button>
  </div>
</div>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-2 md:px-4 py-4">
  <div id="leaderboard-tab" role="tabpanel" aria-label="Leaderboard"></div>
  <div id="stats-tab" class="hidden" role="tabpanel" aria-label="Player Stats"></div>
  <div id="payouts-tab" class="hidden" role="tabpanel" aria-label="Payouts"></div>
  <div id="projections-tab" class="hidden" role="tabpanel" aria-label="Projections"></div>
  <div id="rules-tab" class="hidden" role="tabpanel" aria-label="Rules"></div>
</main>

  { min: 1, max: 1, amount: 1200 },
  { min: 2, max: 2, amount: 800 },

function getPositionPayout(position) {
  for (const p of PAYOUTS) {
    if (position >= p.min && position <= p.max) return p.amount;
  }
  return 0;
}

// For tied players, pool the payouts for all positions they span and split equally.
// e.g. 2-way tie for 1st: pool positions 1 ($1200) + 2 ($800) = $2000, each gets $1000.
function assignTiedPayouts(scored) {
  let i = 0;
  while (i < scored.length) {
    const rank = scored[i].rank;
    // Find all entries sharing this rank
    let j = i;
    while (j < scored.length && scored[j].rank === rank) j++;
    const tiedCount = j - i;
    // Pool payouts for positions i+1 through j (1-indexed)
    let pooled = 0;
    for (let pos = i + 1; pos <= j; pos++) {
      pooled += getPositionPayout(pos);
    }
    const each = Math.floor(pooled / tiedCount);
    for (let k = i; k < j; k++) {
      scored[k].payout = each;
    }
    i = j;
  }
}

// ===== NAME NORMALIZATION =====
function normalizeName(name) {
  if (!name) return "";
  let n = name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
  // Handle characters that don't decompose via NFD (e.g. ø in Højgaard)
  n = n.replace(/ø/g, "o").replace(/æ/g, "ae").replace(/ð/g, "d").replace(/ł/g, "l").replace(/đ/g, "d");
  return NAME_ALIASES[n] || n;
}

function parseRelativeScore(displayValue) {
  if (!displayValue || displayValue === "E" || displayValue === "-") return 0;
  const parsed = parseInt(displayValue, 10);
  return isNaN(parsed) ? 0 : -parsed; // "-5" -> 5 (under par = positive), "+3" -> -3
}

    for (let i = 0; i < 4; i++) {

        } else if (golferPeriod === i + 1 && golferThru > holesCompleted) {

          holesCompleted = golferThru;

        const complete = holesCompleted >= 18;
        const relToPar = parseRelativeScore(rd.displayValue);
        const actualScore = complete ? rd.value : null;

    golfers.set(normalizedName, {
      displayName: name,
      espnId,
      rounds,
      overallScore,
      position,
      sortOrder,
      isActive,
      teeTime: null
    });
  }

  // Determine current round number
  let currentRound = 0;
  for (const [, g] of golfers) {
    for (let i = 0; i < 4; i++) {
      if (g.rounds[i].holesCompleted > 0 && i + 1 > currentRound) {
        currentRound = i + 1;
      }
    }
  }

  // Compute positions from scores when ESPN doesn't provide them
  const hasPositions = [...golfers.values()].some(g => g.position !== null);
  if (!hasPositions) {
    const sorted = [...golfers.entries()]
      .filter(([, g]) => g.isActive)
      .map(([name, g]) => {
        const scoreNum = g.overallScore === "E" ? 0 : parseInt(g.overallScore, 10) || 0;
        return { name, scoreNum };
      })
      .sort((a, b) => a.scoreNum - b.scoreNum);
    let rank = 1;
    for (let i = 0; i < sorted.length; i++) {
      if (i > 0 && sorted[i].scoreNum !== sorted[i - 1].scoreNum) rank = i + 1;
      const g = golfers.get(sorted[i].name);
      g.position = rank;
    }
  }

  // Check if the current round is complete (all active golfers who started it have finished 18 holes)
  let roundComplete = false;
  if (currentRound > 0 && eventStatus === "In Progress") {
    const ri = currentRound - 1;
    const golfersInRound = [...golfers.values()].filter(g => g.rounds[ri].holesCompleted > 0);
    roundComplete = golfersInRound.length > 0 && golfersInRound.every(g =>
      g.rounds[ri].complete || !g.isActive
    );
  }

  // Check if the tournament is complete (all 4 rounds done for active golfers)
  let tournamentComplete = false;
  if (currentRound === 4) {
    const activeGolfers = [...golfers.values()].filter(g => g.isActive);
    tournamentComplete = activeGolfers.length > 0 && activeGolfers.every(g => g.rounds[3].complete);
  }

  return { golfers, eventStatus, currentRound, roundComplete, worstScorePerRound, tournamentComplete };
}

// Fetch tee times from ESPN core API and merge into golfer data
async function fetchTeeTimes(parsedData) {
  if (!parsedData || parsedData.tournamentComplete) return;
  try {
    // Build espnId -> normalizedName lookup
    const idToName = new Map();
    for (const [name, data] of parsedData.golfers) {
      if (data.espnId) idToName.set(data.espnId, name);
    }
    if (idToName.size === 0) return;

    // Fetch statuses in parallel (batches of 20 to be polite)
    const ids = [...idToName.keys()];
    for (let i = 0; i < ids.length; i += 20) {
      const batch = ids.slice(i, i + 20);
      const results = await Promise.all(batch.map(function(id) {
        return fetch(ESPN_CORE_COMPETITORS + "/" + id + "/status")
          .then(function(r) { return r.ok ? r.json() : null; })
          .catch(function() { return null; });
      }));
      for (let j = 0; j < results.length; j++) {
        const status = results[j];
        if (!status || !status.teeTime) continue;
        const golferName = idToName.get(batch[j]);
        if (golferName) {
          const golfer = parsedData.golfers.get(golferName);
          if (golfer) golfer.teeTime = status.teeTime;
        }
      }
    }
  } catch (e) {
    // Tee times are non-critical — silently ignore errors
  }
}

function calculateGolferPoolPoints(golferName, golferData, isBonus, worstScores, currentRound, tournamentComplete) {
  if (!golferData) return { total: 0, rounds: [0,0,0,0], bonus: 0, roundLeader: 0 };

  const multipliers = [1, 2, 3, 4];
  const roundPoints = [0, 0, 0, 0];

  // Check if player missed cut / WD / DQ: they played some rounds but have no data
  // for later rounds that other players have completed
  const playerMaxRound = golferData.rounds.reduce((max, rd, i) => rd.holesCompleted > 0 ? i + 1 : max, 0);

  for (let i = 0; i < 4; i++) {
    const rd = golferData.rounds[i];

    if (rd.holesCompleted > 0) {
      // Player competed in this round - use their actual score
      let pts = rd.relToPar * multipliers[i];
      if (isBonus && pts < 0) pts = 0;
      roundPoints[i] = pts;
    } else if (i + 1 <= currentRound && playerMaxRound > 0 && playerMaxRound < i + 1 && worstScores[i] > 0 && !golferData.isActive) {
      // Player did NOT compete and is inactive (WD/DQ/Missed cut)
      // Assign worst score of the day as penalty
      let pts = (72 - worstScores[i]) * multipliers[i]; // worst score = most over par = big negative
      if (isBonus && pts < 0) pts = 0; // bonus player floor still applies
      roundPoints[i] = pts;
    }
    // else: round hasn't happened yet, 0 points
  }

  // Finish position bonus (only after tournament is complete)
  let finishBonus = 0;
  const pos = golferData.position;
  if (pos && tournamentComplete) {
    if (pos === 1) finishBonus = 15;
    else if (pos >= 2 && pos <= 5) finishBonus = 10;
    else if (pos >= 6 && pos <= 10) finishBonus = 7;
    else if (pos >= 11 && pos <= 20) finishBonus = 5;
    else if (pos >= 21 && pos <= 30) finishBonus = 2;
  }

  const total = roundPoints.reduce((a, b) => a + b, 0) + finishBonus;
  return { total, rounds: roundPoints, bonus: finishBonus, roundLeader: 0 };
}

function calculateAllScores(parsedData) {
  const { golfers, currentRound } = parsedData;

  // Find cumulative tournament leaders after each round (R1-R3)
  // Leader = best cumulative relToPar through that round (positive = under par)
  // Shows live during in-progress rounds, not just after completion
  const roundLeaders = [[], [], []]; // rounds 1-3
  for (let r = 0; r < 3; r++) {
    // Only consider this round if at least one golfer has started it
    let roundStarted = false;
    for (const [, data] of golfers) {
      if (data.rounds[r].holesCompleted > 0) { roundStarted = true; break; }
    }
    if (!roundStarted) continue;

    let bestCumulative = -Infinity;
    for (const [name, data] of golfers) {
      if (!data.isActive) continue;
      // Cumulative relToPar through this round
      let cumulative = 0;
      for (let i = 0; i <= r; i++) cumulative += data.rounds[i].relToPar;
      if (cumulative > bestCumulative) {
        bestCumulative = cumulative;
        roundLeaders[r] = [name];
      } else if (cumulative === bestCumulative) {
        roundLeaders[r].push(name);
      }
    }
  }

  const scored = ENTRIES.map((entry, idx) => {
    const players = [...entry.p, entry.b];
    let totalPoints = 0;
    const playerDetails = [];

    for (let pi = 0; pi < 5; pi++) {
      const playerName = players[pi];
      const isBonus = pi === 4;
      const normalized = normalizeName(playerName);
      const golferData = golfers.get(normalized);

      const pts = calculateGolferPoolPoints(normalized, golferData, isBonus, parsedData.worstScorePerRound, currentRound, parsedData.tournamentComplete);

      // Round leader bonus
      let leaderBonus = 0;
      for (let r = 0; r < 3; r++) {
        if (roundLeaders[r].includes(normalized)) {
          leaderBonus += 5;
        }
      }
      pts.roundLeader = leaderBonus;
      pts.total += leaderBonus;

      totalPoints += pts.total;
      // Current-round thru info
      const currentRdIdx = currentRound - 1;
      const currentRdData = golferData?.rounds?.[currentRdIdx];
      const thru = currentRdData ? currentRdData.holesCompleted : 0;
      const isOnCourse = currentRdIdx >= 0 && currentRdData &&
        currentRdData.holesCompleted > 0 && !currentRdData.complete;
      const roundComplete = currentRdData ? currentRdData.complete : false;

      playerDetails.push({
        name: playerName,
        displayName: golferData?.displayName || playerName,
        isBonus,
        salary: FIELD_SALARIES[playerName] || 0,
        overallScore: golferData?.overallScore || "N/A",
        position: golferData?.position || null,
        isActive: golferData?.isActive !== false,
        thru,
        isOnCourse,
        roundComplete,
        teeTime: golferData?.teeTime || null,
        ...pts
      });
    }

    return {
      rank: 0,
      name: entry.n,
      winningScore: entry.w,
      totalPoints,
      players: playerDetails,
      entryIdx: idx
    };
  });

  // Find the tournament leader's total strokes for tiebreaker comparison
  let leaderTotalStrokes = null;
  for (const [, data] of golfers) {
    if (data.position === 1) {
      // Sum completed round scores to get total strokes
      const totalStrokes = data.rounds.reduce((sum, rd) => sum + (rd.score || 0), 0);
      if (totalStrokes > 0) leaderTotalStrokes = totalStrokes;
      break;
    }
  }

  // Sort by total points descending, then by tiebreaker (closest to leader's score)
  scored.sort((a, b) => {
    if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
    if (leaderTotalStrokes !== null) {
      const aDiff = Math.abs(a.winningScore - leaderTotalStrokes);
      const bDiff = Math.abs(b.winningScore - leaderTotalStrokes);
      return aDiff - bDiff;
    }
    return 0;
  });

  // Assign ranks (handle ties — only truly tied if same points AND same tiebreaker distance)
  let rank = 1;
  for (let i = 0; i < scored.length; i++) {
    if (i > 0) {
      const prev = scored[i-1];
      const curr = scored[i];
      const samePoints = curr.totalPoints === prev.totalPoints;
      const sameTB = curr.winningScore === prev.winningScore;
      if (!samePoints || !sameTB) {
        rank = i + 1;
      }
    }
    scored[i].rank = rank;
  }

  assignTiedPayouts(scored);

  return scored;
}

let lastData = null;

// Stats tab sort/expand state (persists across 30s data refreshes)
let statsSortCol = 'poolPoints';
let statsSortDir = 'desc';
let expandedStatsGolfer = null;

function sortStats(col) {
  if (statsSortCol === col) {
    statsSortDir = statsSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    statsSortCol = col;
    statsSortDir = 'desc';
  }
  renderStats();
}

function toggleStatsExpand(normalizedName) {
  expandedStatsGolfer = expandedStatsGolfer === normalizedName ? null : normalizedName;
  renderStats();
}

function parseScoreForSort(val) {
  if (val === null || val === undefined || val === "N/A") return 9999;
  if (val === "E") return 0;
  const n = parseInt(val, 10);
  return isNaN(n) ? 9999 : n;
}

function getSortValue(g, col) {
  switch (col) {
    case 'name': return g.name.toLowerCase();
    case 'position': return g.position || 9999;
    case 'overallScore': return parseScoreForSort(g.overallScore);
    case 'salary': return g.salary;
    case 'pickCount': return g.pickCount;
    case 'r1': return g.rounds[0] || 0;
    case 'r2': return g.rounds[1] || 0;
    case 'r3': return g.rounds[2] || 0;
    case 'r4': return g.rounds[3] || 0;
    case 'finishBonus': return g.finishBonus;
    case 'roundLeader': return g.roundLeaderBonus;
    case 'poolPoints': return g.poolPoints;
    case 'value': return g.salary > 0 ? g.poolPoints / g.salary : (g.poolPoints > 0 ? Infinity : 0);
    default: return 0;
  }
}

async function fetchAndScore() {
  try {
    const resp = await fetch(ESPN_URL);
    if (!resp.ok) throw new Error("ESPN API error: " + resp.status);
    const data = await resp.json();
    lastData = parseESPNData(data);
    await fetchTeeTimes(lastData);
    lastUpdate = new Date();

    // Save previous ranks before recalculating
    const oldRanks = new Map();
    for (const e of allScored) oldRanks.set(e.name, e.rank);

    allScored = calculateAllScores(lastData);

    // Calculate rank changes (only if we had previous data)
    if (oldRanks.size > 0) {
      for (const e of allScored) {
        const prev = oldRanks.get(e.name);
        e.rankChange = prev !== undefined ? prev - e.rank : 0; // positive = moved up
      }
    } else {
      for (const e of allScored) e.rankChange = 0;
    }

    document.getElementById("liveStatus").textContent = "LIVE";
    document.getElementById("liveStatus").className = "text-green-300 font-medium";

    const statusText = lastData.roundComplete
      ? "End of Round " + lastData.currentRound
      : lastData.eventStatus;
    const roundInfo = lastData.currentRound > 0
      ? "Round " + lastData.currentRound + " • " + statusText
      : lastData.eventStatus;
    document.getElementById("roundInfo").textContent = roundInfo + " • Updated " + lastUpdate.toLocaleTimeString();

    renderCurrentTab();

    // Run projections in background on every data change (so results are ready when user clicks tab)
    // Wrapped in its own try/catch so a sim error never shows OFFLINE
    try {
      const simHash = computeSimHash(lastData);
      if (simHash !== lastSimHash) {
        requestIdleCallback(function() {
          try {
            prevSimResults = lastSimResults;
            lastSimResults = runSimulations(lastData);
            lastSimHash = simHash;
            lastLeverageResults = null;
            leverageComputing = false;
            if (lastSimResults) {
              simProbHistory.push(lastSimResults.slice(0, 20).map(function(r) { return { name: r.name, winPct: r.winPct }; }));
              if (simProbHistory.length > 20) simProbHistory.shift();
            }
            requestIdleCallback(function() {
              try {
                lastLeverageResults = computeLeverage(lastData);
                leverageComputing = false;
                if (currentTab === "projections") renderProjections();
              } catch (e) { console.error("Leverage error:", e); }
            });
            if (currentTab === "projections") renderProjections();
          } catch (e) { console.error("Simulation error:", e); }
        });
      }
    } catch (e) { console.error("Projections init error:", e); }

    // Clear movement indicators after 4 seconds
    setTimeout(() => {
      let hadChanges = false;
      for (const e of allScored) {
        if (e.rankChange !== 0) hadChanges = true;
        e.rankChange = 0;
      }
      if (hadChanges) renderCurrentTab();
    }, 4000);
  } catch (err) {
    console.error("Fetch error:", err);
    document.getElementById("liveStatus").textContent = "OFFLINE";
    document.getElementById("liveStatus").className = "text-red-400 font-medium";
  }
}

  html += '</div>';

  // Inline expansion (detail card)
  if (isExpanded) {
    html += '<div class="border-t border-board-border/50">';
    html += renderDetailCard(entry, false);
    html += '</div>';
  }

  html += '</div>';

  return html;
}

function renderStats() {
  const container = document.getElementById("stats-tab");
  // Note: innerHTML usage here is safe — all data comes from ESPN API and hardcoded ENTRIES,
  // not from user input. No untrusted content is rendered.
  if (!lastData) { container.innerHTML = '<div class="text-center text-gray-400 py-8">Loading...</div>'; return; }

  // Compute round leaders (same logic as calculateAllScores lines 405-430)
  const roundLeaders = [[], [], []];
  for (let r = 0; r < 3; r++) {
    let roundStarted = false;
    for (const [, data] of lastData.golfers) {
      if (data.rounds[r].holesCompleted > 0) { roundStarted = true; break; }
    }
    if (!roundStarted) continue;
    let bestCumulative = -Infinity;
    for (const [name, data] of lastData.golfers) {
      if (!data.isActive) continue;
      let cumulative = 0;
      for (let i = 0; i <= r; i++) cumulative += data.rounds[i].relToPar;
      if (cumulative > bestCumulative) {
        bestCumulative = cumulative;
        roundLeaders[r] = [name];
      } else if (cumulative === bestCumulative) {
        roundLeaders[r].push(name);
      }
    }
  }

  // Calculate golfer stats
  const golferStats = [];
  for (const [normalizedName, data] of lastData.golfers) {
    let pickCount = 0;
    let asBonusCount = 0;
    for (const e of ENTRIES) {
      const allPlayers = [...e.p, e.b].map(n => normalizeName(n));
      if (allPlayers.includes(normalizedName)) {
        pickCount++;
        if (normalizeName(e.b) === normalizedName) asBonusCount++;
      }
    }

    const pts = calculateGolferPoolPoints(normalizedName, data, false, lastData.worstScorePerRound, lastData.currentRound, lastData.tournamentComplete);

    // Round leader bonus
    let roundLeaderBonus = 0;
    for (let r = 0; r < 3; r++) {
      if (roundLeaders[r].includes(normalizedName)) roundLeaderBonus += 5;
    }
    pts.total += roundLeaderBonus;

    // Current-round status
    const currentRdIdx = lastData.currentRound - 1;
    const currentRdData = data.rounds[currentRdIdx];
    const thru = currentRdData ? currentRdData.holesCompleted : 0;
    const isOnCourse = currentRdIdx >= 0 && currentRdData && currentRdData.holesCompleted > 0 && !currentRdData.complete;
    const roundComplete = currentRdData ? currentRdData.complete : false;
    const cutRisk = data.isActive && lastData.currentRound <= 2 && data.position && data.position > 50;

    // Ownership
    const ownershipPct = (pickCount / ENTRIES.length * 100);
    const ownerEntries = [];
    for (let ei = 0; ei < allScored.length; ei++) {
      const entry = allScored[ei];
      for (const p of entry.players) {
        if (normalizeName(p.name) === normalizedName) {
          ownerEntries.push({ name: entry.name, rank: entry.rank, points: entry.totalPoints, isBonus: p.isBonus });
          break;
        }
      }
    }

    golferStats.push({
      name: data.displayName,
      normalizedName,
      overallScore: data.overallScore,
      position: data.position,
      pickCount,
      asBonusCount,
      poolPoints: pts.total,
      rounds: pts.rounds,
      finishBonus: pts.bonus,
      roundLeaderBonus,
      salary: FIELD_SALARIES[Object.keys(FIELD_SALARIES).find(k => normalizeName(k) === normalizedName)] || 0,
      isActive: data.isActive,
      isOnCourse,
      thru,
      roundComplete,
      teeTime: data.teeTime,
      cutRisk,
      ownershipPct,
      ownerEntries
    });
  }

  // Sort
  golferStats.sort(function(a, b) {
    const aVal = getSortValue(a, statsSortCol);
    const bVal = getSortValue(b, statsSortCol);
    const dir = statsSortDir === 'asc' ? 1 : -1;
    if (statsSortCol === 'name') return dir * (aVal < bVal ? -1 : aVal > bVal ? 1 : 0);
    if (aVal === bVal) return 0;
    return dir * (aVal < bVal ? -1 : 1);
  });

  // Sort arrow helper
  function sortArrow(col) {
    if (statsSortCol !== col) return '';
    return statsSortDir === 'desc' ? ' \u25BC' : ' \u25B2';
  }

  var html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';

  // Main performance table
  html += '<div class="bg-board-card border border-board-border rounded-xl p-4 col-span-full"><h3 class="text-augusta-gold font-bold text-lg mb-3">Player Performance</h3>';
  html += '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-gray-400 text-xs uppercase">';
  html += '<th class="text-left pb-2 pr-2 cursor-pointer hover:text-white select-none" onclick="sortStats(\'name\')">Player' + sortArrow('name') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none" onclick="sortStats(\'position\')">Pos' + sortArrow('position') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none" onclick="sortStats(\'overallScore\')">Score' + sortArrow('overallScore') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'salary\')">$' + sortArrow('salary') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none" onclick="sortStats(\'pickCount\')">Picked' + sortArrow('pickCount') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'r1\')">R1' + sortArrow('r1') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'r2\')">R2' + sortArrow('r2') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'r3\')">R3' + sortArrow('r3') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'r4\')">R4' + sortArrow('r4') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'finishBonus\')">Fin' + sortArrow('finishBonus') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'roundLeader\')">Ldr' + sortArrow('roundLeader') + '</th>';
  html += '<th class="text-right pb-2 cursor-pointer hover:text-white select-none" onclick="sortStats(\'poolPoints\')">Pts' + sortArrow('poolPoints') + '</th>';
  html += '<th class="text-center pb-2 px-1 cursor-pointer hover:text-white select-none hidden md:table-cell" onclick="sortStats(\'value\')">Val' + sortArrow('value') + '</th>';
  html += '</tr></thead><tbody>';

  for (const g of golferStats) {
    const ptsColor = g.poolPoints > 0 ? "text-green-400" : g.poolPoints < 0 ? "text-red-400" : "text-gray-400";
    const value = g.salary > 0 ? (g.poolPoints / g.salary * 100).toFixed(1) : (g.poolPoints > 0 ? "\u221e" : "0");
    const isBonus = BONUS_PLAYERS.has(Object.keys(FIELD_SALARIES).find(k => normalizeName(k) === normalizeName(g.name)) || "");
    const isExpanded = expandedStatsGolfer === g.normalizedName;

    // Row background
    const rowBg = !g.isActive ? ' bg-red-900/20' : g.cutRisk ? ' bg-orange-900/15' : '';

    // Ownership heat
    const heatBg = g.ownershipPct >= 50 ? ' bg-blue-500/30' : g.ownershipPct >= 30 ? ' bg-blue-500/20' : g.ownershipPct >= 10 ? ' bg-blue-500/10' : '';

    html += '<tr class="border-t border-board-border hover:bg-board-hover cursor-pointer' + rowBg + '" onclick="toggleStatsExpand(\'' + g.normalizedName.replace(/'/g, "\\'") + '\')">';

    // Player name + badges
    html += '<td class="py-2 pr-2"><div class="flex flex-wrap items-center gap-1"><span class="font-medium truncate max-w-[140px] md:max-w-none ' + (!g.isActive ? 'text-red-400' : g.cutRisk ? 'text-orange-400' : 'text-white') + '">' + g.name + '</span>';
    if (!g.isActive) html += '<span class="text-xs bg-red-500/20 text-red-400 px-1 rounded">CUT</span>';
    else if (g.cutRisk) html += '<span class="text-xs bg-orange-500/20 text-orange-400 px-1 rounded">CUT RISK</span>';
    if (g.isOnCourse) {
      html += '<span class="text-xs bg-blue-500/20 text-blue-400 px-1 rounded">Thru ' + g.thru + '</span>';
    } else if (g.isActive && g.roundComplete) {
      html += '<span class="text-xs bg-green-500/20 text-green-400 px-1 rounded">F</span>';
    } else if (g.isActive && g.teeTime) {
      var tee = new Date(g.teeTime);
      var timeStr = tee.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      html += '<span class="text-xs bg-gray-500/20 text-gray-400 px-1 rounded">' + timeStr + '</span>';
    }
    if (isBonus) html += '<span class="text-xs bg-yellow-500/20 text-yellow-400 px-1 rounded">BONUS</span>';
    html += '</div></td>';

    // Position
    html += '<td class="py-2 px-1 text-center text-xs font-mono">' + (g.position ? (g.position <= 10 ? '<span class="text-green-400">T' + g.position + '</span>' : '<span class="text-gray-400">T' + g.position + '</span>') : '<span class="text-gray-600">-</span>') + '</td>';

    // Score
    html += '<td class="py-2 px-1 text-center font-mono">' + (g.overallScore || "-") + '</td>';

    // Salary (hidden mobile)
    html += '<td class="py-2 px-1 text-center text-gray-400 text-xs hidden md:table-cell">' + g.salary + '</td>';

    // Picked + heat
    html += '<td class="py-2 px-1 text-center text-xs' + heatBg + '">' + g.pickCount + ' <span class="text-gray-600">(' + g.ownershipPct.toFixed(0) + '%)</span></td>';

    // R1-R4 (hidden mobile)
    for (var r = 0; r < 4; r++) {
      var rv = g.rounds[r];
      var rc = rv > 0 ? "text-green-400" : rv < 0 ? "text-red-400" : "text-gray-600";
      html += '<td class="py-2 px-1 text-center font-mono text-xs hidden md:table-cell ' + rc + '">' + (rv !== 0 ? formatPoints(rv) : "-") + '</td>';
    }

    // Finish bonus (hidden mobile)
    html += '<td class="py-2 px-1 text-center font-mono text-xs text-yellow-400 hidden md:table-cell">' + (g.finishBonus > 0 ? "+" + g.finishBonus : "-") + '</td>';

    // Leader bonus (hidden mobile)
    html += '<td class="py-2 px-1 text-center font-mono text-xs text-blue-400 hidden md:table-cell">' + (g.roundLeaderBonus > 0 ? "+" + g.roundLeaderBonus : "-") + '</td>';

    // Pool Pts
    html += '<td class="py-2 text-right font-bold ' + ptsColor + '">' + formatPoints(g.poolPoints) + '</td>';

    // Value (hidden mobile)
    html += '<td class="py-2 px-1 text-center text-gray-400 text-xs hidden md:table-cell">' + value + '</td>';

    html += '</tr>';

    // Expanded owner row
    if (isExpanded && g.ownerEntries.length > 0) {
      html += '<tr class="bg-board-bg/50"><td colspan="13" class="px-4 py-3">';
      html += '<div class="text-xs text-gray-400 mb-2">' + g.ownerEntries.length + ' entries own ' + g.name + '</div>';
      html += '<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-1 max-h-48 overflow-y-auto">';
      for (var oi = 0; oi < g.ownerEntries.length; oi++) {
        var oe = g.ownerEntries[oi];
        var oeColor = oe.points > 0 ? "text-green-400" : oe.points < 0 ? "text-red-400" : "text-gray-400";

        html += '<span class="text-gray-300">#' + oe.rank + ' ' + oe.name + (oe.isBonus ? ' <span class="text-yellow-500">B</span>' : '') + '</span>';
        html += '<span class="font-mono ' + oeColor + '">' + formatPoints(oe.points) + '</span>';
        html += '</div>';
      }
      html += '</div></td></tr>';
    } else if (isExpanded) {
      html += '<tr class="bg-board-bg/50"><td colspan="13" class="px-4 py-3 text-xs text-gray-400">No entries picked ' + g.name + '</td></tr>';
    }
  }

  html += '</tbody></table></div></div>';

  // Most picked card
  const byPicks = [...golferStats].sort((a, b) => b.pickCount - a.pickCount).slice(0, 10);
  html += '<div class="bg-board-card border border-board-border rounded-xl p-4"><h3 class="text-augusta-gold font-bold mb-3">Most Picked</h3><div class="space-y-2">';
  for (const g of byPicks) {

    html += '<div class="flex items-center justify-between text-sm"><span class="text-white">' + g.name + '</span><div class="flex items-center gap-2"><div class="w-24 bg-board-bg rounded-full h-2"><div class="bg-masters-green rounded-full h-2" style="width:' + pct + '%"></div></div><span class="text-gray-400 text-xs w-12 text-right">' + g.pickCount + ' (' + pct + '%)</span></div></div>';
  }
  html += '</div></div>';

  // Best value card
  const byValue = golferStats.filter(g => g.salary > 0).sort((a, b) => (b.poolPoints/b.salary) - (a.poolPoints/a.salary)).slice(0, 10);

  html += '</div>';
  container.innerHTML = html;
}

// ===== PROJECTIONS ENGINE (Monte Carlo Win Probability) =====
// Mirrors scoring logic in calculateGolferPoolPoints (line ~277) and calculateAllScores (line ~320).
// If scoring rules change, update BOTH the live engine and this simulation engine.

let lastSimResults = null;
let lastSimHash = "";
let prevSimResults = null;
let simProbHistory = []; // last 20 snapshots for sparklines
let simRunning = false;

// Seeded PRNG (mulberry32) — deterministic results for same input data
let _seed = 1;
function seededRandom() {
  _seed |= 0; _seed = _seed + 0x6D2B79F5 | 0;
  let t = Math.imul(_seed ^ _seed >>> 15, 1 | _seed);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

// Box-Muller Normal RNG — returns z ~ Normal(0,1), uses seeded PRNG
function normalRandom() {
  let u = 0, v = 0;
  while (u === 0) u = seededRandom();
  while (v === 0) v = seededRandom();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

// Hash seed from string — simple djb2
function hashToSeed(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
  return h >>> 0;
}

function computeSimHash(pd) {
  if (!pd || !pd.golfers) return "";
  // Sort golfer keys so ESPN reordering tied golfers doesn't change the hash
  const sortedNames = [...pd.golfers.keys()].sort();
  let h = pd.currentRound + "|" + pd.eventStatus + "|";
  for (const n of sortedNames) {
    const d = pd.golfers.get(n);
    h += n + ":" + d.rounds.map(r => (r.score||0) + "," + r.holesCompleted).join(";") + "|";
  }
  return h;
}

function buildGolferProjections(pd) {
  const { golfers, currentRound } = pd;
  const allScoresArr = [];
  for (const [, d] of golfers) {
    for (const rd of d.rounds) {
      if (rd.complete && rd.score) allScoresArr.push(rd.score);
    }
  }
  const fieldMean = allScoresArr.length > 0 ? allScoresArr.reduce((a,b) => a+b, 0) / allScoresArr.length : 74;
  const fieldSigma = allScoresArr.length > 1
    ? Math.sqrt(allScoresArr.reduce((s, x) => s + (x - fieldMean) ** 2, 0) / (allScoresArr.length - 1))
    : 3.6;

  const priorWeight = 2;
  const projs = new Map();

  for (const [name, d] of golfers) {
    const completed = [];
    const roundScores = [null, null, null, null];
    for (let i = 0; i < 4; i++) {
      if (d.rounds[i].complete && d.rounds[i].score) {
        completed.push(d.rounds[i].score);
        roundScores[i] = d.rounds[i].score;
      } else if (d.rounds[i].holesCompleted > 0 && !d.rounds[i].complete) {
        const partial = d.rounds[i].relToPar;
        const holes = d.rounds[i].holesCompleted;
        if (holes > 0) {
          const projectedScore = 72 - (partial * (18 / holes));
          roundScores[i] = Math.round(projectedScore);
        }
      }
    }
    const N = completed.length;
    const sum = completed.reduce((a, b) => a + b, 0);
    const mean = (sum + priorWeight * fieldMean) / (N + priorWeight);

    projs.set(name, { mean, completedRounds: N, roundScores, isActive: d.isActive });
  }
  // Build array form for fast simulation
  const golferNames = [...projs.keys()];
  const nameToIdx = buildSimLookups(golferNames);
  const golferArr = golferNames.map(n => projs.get(n));

  return { projs, fieldMean, fieldSigma, currentRound, golferArr, golferNames, nameToIdx };
}

// Pre-compute entry golfer indices for fast simulation scoring
let simEntryGolferIndices = null; // [entryIdx][0..4] = golfer array index

function buildSimLookups(golferNames) {
  const nameToIdx = new Map();
  for (let i = 0; i < golferNames.length; i++) nameToIdx.set(golferNames[i], i);

  simEntryGolferIndices = new Array(ENTRIES.length);
  for (let ei = 0; ei < ENTRIES.length; ei++) {
    const entry = ENTRIES[ei];
    const players = [...entry.p, entry.b];
    const indices = new Int16Array(5);
    for (let pi = 0; pi < 5; pi++) {
      const idx = nameToIdx.get(normalizeName(players[pi]));
      indices[pi] = idx !== undefined ? idx : -1;
    }
    simEntryGolferIndices[ei] = indices;
  }
  return nameToIdx;
}

function simulateOneTournament(projData, pinnedGolferIdx, pinnedScore) {
  const { golferArr, fieldSigma, currentRound, nameToIdx } = projData;
  const N = golferArr.length;
  // scores[golfer][round] — flat array for speed
  const scores = new Int8Array(N * 4); // offset = gi*4 + r, stores (score - 72) = relToPar inverted
  const worstPerRound = [0, 0, 0, 0]; // actual stroke count
  const actualScores = new Uint8Array(N * 4); // actual stroke counts

  for (let gi = 0; gi < N; gi++) {
    const g = golferArr[gi];
    for (let r = 0; r < 4; r++) {
      const off = gi * 4 + r;
      if (g.roundScores[r] !== null) {
        actualScores[off] = g.roundScores[r];
      } else if (!g.isActive && g.completedRounds > 0 && g.completedRounds <= r) {
        actualScores[off] = 0; // placeholder for worst score
      } else if (gi === pinnedGolferIdx) {
        actualScores[off] = pinnedScore;
      } else {
        actualScores[off] = Math.round(Math.max(60, Math.min(90, g.mean + fieldSigma * normalRandom())));
      }
      if (actualScores[off] > 0 && actualScores[off] > worstPerRound[r]) worstPerRound[r] = actualScores[off];
    }
  }

  // Simulate cut after R2
  if (currentRound < 3) {
    const cutTotals = new Array(N);
    for (let gi = 0; gi < N; gi++) {
      const s0 = actualScores[gi * 4] || 0;
      const s1 = actualScores[gi * 4 + 1] || 0;
      cutTotals[gi] = { gi, total: s0 + s1 };
    }
    cutTotals.sort((a, b) => a.total - b.total);
    if (cutTotals.length > 50) {
      const cutLine = cutTotals[49].total;
      for (const c of cutTotals) {
        if (c.total > cutLine) {
          const g = golferArr[c.gi];
          if (!g.roundScores[2]) actualScores[c.gi * 4 + 2] = 0;
          if (!g.roundScores[3]) actualScores[c.gi * 4 + 3] = 0;
        }
      }
    }
  }

  // Fill worst scores for cut players
  for (let gi = 0; gi < N; gi++) {
    for (let r = 0; r < 4; r++) {
      const off = gi * 4 + r;
      if (actualScores[off] === 0) actualScores[off] = worstPerRound[r] || 84;
      if (actualScores[off] > worstPerRound[r]) worstPerRound[r] = actualScores[off];
    }
  }

  // Rank golfers by total strokes
  const golferTotals = new Array(N);
  for (let gi = 0; gi < N; gi++) {
    golferTotals[gi] = { gi, total: actualScores[gi*4] + actualScores[gi*4+1] + actualScores[gi*4+2] + actualScores[gi*4+3] };
  }
  golferTotals.sort((a, b) => a.total - b.total);
  const finishPos = new Uint8Array(N);
  let fRank = 1;
  for (let i = 0; i < N; i++) {
    if (i > 0 && golferTotals[i].total > golferTotals[i - 1].total) fRank = i + 1;
    finishPos[golferTotals[i].gi] = fRank;
  }

  // Cumulative tournament leaders R1-R3 (matches main scoring engine)
  const leaderSets = [new Set(), new Set(), new Set()];
  for (let r = 0; r < 3; r++) {
    let bestCumulative = -999;
    for (let gi = 0; gi < N; gi++) {
      let cumulative = 0;
      for (let i = 0; i <= r; i++) cumulative += (72 - actualScores[gi * 4 + i]);
      if (cumulative > bestCumulative) { bestCumulative = cumulative; leaderSets[r] = new Set([gi]); }
      else if (cumulative === bestCumulative) leaderSets[r].add(gi);
    }
  }

  // Score all entries using pre-computed golfer indices
  const entryResults = new Array(ENTRIES.length);
  for (let ei = 0; ei < ENTRIES.length; ei++) {
    const gis = simEntryGolferIndices[ei];
    let total = 0;

    for (let pi = 0; pi < 5; pi++) {
      const gi = gis[pi];
      if (gi < 0) continue;
      const isBonus = pi === 4;
      const off = gi * 4;

      // Round points with multipliers [1,2,3,4]
      let rp = (72 - actualScores[off]) * 1 + (72 - actualScores[off+1]) * 2 + (72 - actualScores[off+2]) * 3 + (72 - actualScores[off+3]) * 4;
      if (isBonus) {
        // Recalculate with floor per round
        rp = 0;
        for (let r = 0; r < 4; r++) {
          let pts = (72 - actualScores[off + r]) * (r + 1);
          if (pts < 0) pts = 0;
          rp += pts;
        }
      }

      // Finish position bonus
      const pos = finishPos[gi];
      if (pos === 1) rp += 15;
      else if (pos <= 5) rp += 10;
      else if (pos <= 10) rp += 7;
      else if (pos <= 20) rp += 5;
      else if (pos <= 30) rp += 2;

      // Leader bonus
      for (let r = 0; r < 3; r++) {
        if (leaderSets[r].has(gi)) rp += 5;
      }
      total += rp;
    }
    entryResults[ei] = { idx: ei, total, ws: ENTRIES[ei].w };
  }

  const winnerStrokes = golferTotals[0].total;
  entryResults.sort((a, b) => {
    if (b.total !== a.total) return b.total - a.total;
    return Math.abs(a.ws - winnerStrokes) - Math.abs(b.ws - winnerStrokes);
  });
  return entryResults;
}

function runSimulations(pd, numSims) {
  numSims = numSims || 3000;
  if (!pd || !pd.golfers || pd.golfers.size === 0) return null;
  // Seed PRNG from data hash so identical data always produces identical probabilities
  _seed = hashToSeed(computeSimHash(pd));
  const t0 = performance.now();
  const projData = buildGolferProjections(pd);

  const wins = new Float32Array(ENTRIES.length);
  const top5Arr = new Float32Array(ENTRIES.length);
  const inMoneyArr = new Float32Array(ENTRIES.length);
  const payoutSumArr = new Float32Array(ENTRIES.length);
  const bkts = ENTRIES.map(() => [0, 0, 0, 0, 0]);

  for (let s = 0; s < numSims; s++) {
    const results = simulateOneTournament(projData);
    let rank = 1;
    for (let i = 0; i < results.length; i++) {
      if (i > 0) {
        const same = results[i].total === results[i - 1].total && results[i].ws === results[i - 1].ws;
        if (!same) rank = i + 1;
      }
      const idx = results[i].idx;
      if (rank === 1) wins[idx]++;
      if (rank <= 5) top5Arr[idx]++;
      if (rank <= 41) inMoneyArr[idx]++;
      payoutSumArr[idx] += getPositionPayout(rank);
      const b = bkts[idx];
      if (rank === 1) b[0]++;
      else if (rank <= 5) b[1]++;
      else if (rank <= 10) b[2]++;
      else if (rank <= 41) b[3]++;
      else b[4]++;
    }
  }

  const results = ENTRIES.map((entry, idx) => ({
    name: entry.n,
    entryIdx: idx,
    winPct: wins[idx] / numSims * 100,
    top5Pct: top5Arr[idx] / numSims * 100,
    inMoneyPct: inMoneyArr[idx] / numSims * 100,
    expectedPayout: Math.round(payoutSumArr[idx] / numSims),
    rankBuckets: bkts[idx].map(c => c / numSims * 100)
  }));
  results.sort((a, b) => b.winPct - a.winPct || b.top5Pct - a.top5Pct || b.inMoneyPct - a.inMoneyPct);

  const elapsed = Math.round(performance.now() - t0);
  console.log("MC simulation: " + numSims + " iterations in " + elapsed + "ms");
  const totalWin = results.reduce((s, r) => s + r.winPct, 0);
  if (Math.abs(totalWin - 100) > 1) console.warn("Win probabilities sum: " + totalWin.toFixed(1));
  return results;
}

// ===== LEVERAGE CALCULATION =====

function computeOwnershipMap() {
  const map = new Map();
  for (let i = 0; i < ENTRIES.length; i++) {
    const players = [...ENTRIES[i].p, ENTRIES[i].b];
    for (const p of players) {
      const n = normalizeName(p);
      if (!map.has(n)) map.set(n, new Set());
      map.get(n).add(i);
    }
  }
  return map;
}

function computeLeverage(pd) {
  if (!pd || !pd.golfers || !allScored || allScored.length === 0) return [];
  const projData = buildGolferProjections(pd);
  const ownership = computeOwnershipMap();

  const top20Entries = allScored.slice(0, 20).map(e => ENTRIES.findIndex(en => en.n === e.name));
  const relevantGolfers = new Set();
  for (const idx of top20Entries) {
    if (idx < 0) continue;
    const players = [...ENTRIES[idx].p, ENTRIES[idx].b];
    for (const p of players) relevantGolfers.add(normalizeName(p));
  }
  const threshold = ENTRIES.length * 0.05;
  for (const [golfer, owners] of ownership) {
    if (owners.size >= threshold) relevantGolfers.add(golfer);
  }

  const leverageGolfers = [];
  for (const [name, data] of pd.golfers) {
    if (!relevantGolfers.has(name)) continue;
    const currentRd = pd.currentRound - 1;
    const isOnCourse = currentRd >= 0 && data.rounds[currentRd] &&
      data.rounds[currentRd].holesCompleted > 0 && !data.rounds[currentRd].complete;
    leverageGolfers.push({
      name, displayName: data.displayName || name, isOnCourse,
      thru: data.rounds[currentRd] ? data.rounds[currentRd].holesCompleted : 0,
      roundScore: data.rounds[currentRd] ? data.rounds[currentRd].relToPar : 0,
      ownerCount: ownership.get(name) ? ownership.get(name).size : 0
    });
  }

  const t0 = performance.now();
  const leverageResults = [];

  // Limit to top 15 highest-ownership golfers for performance
  leverageGolfers.sort(function(a, b) { return b.ownerCount - a.ownerCount; });
  const leverageSubset = leverageGolfers.slice(0, 15);

  for (const g of leverageSubset) {
    const proj = projData.projs.get(g.name);
    if (!proj) continue;
    const golferIdx = projData.nameToIdx.get(g.name);
    if (golferIdx === undefined) continue;
    const birdieScore = Math.round(proj.mean - 1);
    const bogeyScore = Math.round(proj.mean + 1);

    const birdieWins = new Float32Array(ENTRIES.length);
    for (let s = 0; s < 200; s++) {
      const r = simulateOneTournament(projData, golferIdx, birdieScore);
      let rank = 1;
      for (let i = 0; i < r.length; i++) {
        if (i > 0 && (r[i].total !== r[i-1].total || r[i].ws !== r[i-1].ws)) rank = i + 1;
        if (rank === 1) birdieWins[r[i].idx]++;
      }
    }

    const bogeyWins = new Float32Array(ENTRIES.length);
    for (let s = 0; s < 200; s++) {
      const r = simulateOneTournament(projData, golferIdx, bogeyScore);
      let rank = 1;
      for (let i = 0; i < r.length; i++) {
        if (i > 0 && (r[i].total !== r[i-1].total || r[i].ws !== r[i-1].ws)) rank = i + 1;
        if (rank === 1) bogeyWins[r[i].idx]++;
      }
    }

    let maxSwing = 0;
    let swingEntry = "";
    for (let i = 0; i < Math.min(20, allScored.length); i++) {
      const idx = allScored[i].entryIdx;
      const swing = (birdieWins[idx] - bogeyWins[idx]) / 200 * 100;
      if (Math.abs(swing) > Math.abs(maxSwing)) {
        maxSwing = swing;
        swingEntry = allScored[i].name;
      }
    }

    leverageResults.push({
      ...g,
      maxSwing: Math.abs(maxSwing),
      swingEntry,
      swingDirection: maxSwing > 0 ? "+" : "-"
    });
  }

  leverageResults.sort((a, b) => b.maxSwing - a.maxSwing);
  console.log("Leverage sims: " + leverageGolfers.length + " golfers in " + Math.round(performance.now() - t0) + "ms");
  return leverageResults;
}

// ===== DIFFERENTIAL ANALYSIS =====

function computeDifferentials() {
  if (!allScored || allScored.length < 10) return [];
  const top10 = allScored.slice(0, 10);
  const top10Golfers = new Map();

  for (const entry of top10) {
    const e = ENTRIES[entry.entryIdx];
    const players = [...e.p, e.b];
    for (const p of players) {
      const n = normalizeName(p);
      top10Golfers.set(n, (top10Golfers.get(n) || 0) + 1);
    }
  }

  return top10.map(entry => {
    const e = ENTRIES[entry.entryIdx];
    const players = [...e.p, e.b];
    const diffs = [];
    const shared = [];
    for (let pi = 0; pi < players.length; pi++) {
      const n = normalizeName(players[pi]);
      const count = top10Golfers.get(n) || 0;
      const gd = lastData ? lastData.golfers.get(n) : null;
      const info = {
        name: players[pi],
        displayName: gd ? gd.displayName : players[pi],
        isBonus: pi === 4,
        overallScore: gd ? gd.overallScore : "N/A",
        sharedCount: count
      };
      if (count <= 1) diffs.push(info);
      else shared.push(info);
    }
    return { name: entry.name, rank: entry.rank, totalPoints: entry.totalPoints, diffs, shared };
  });
}

  h2.textContent = title;

    }

    wrap.appendChild(card);
  }

  return wrap;
}
